apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: parksmap-helm-prod
  namespace: openshift-gitops
  labels:
    workshop: cap12
    lab: helm
    app: parksmap
    environment: prod
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/workshop-gitops/cap12-labs.git
    targetRevision: main
    path: parksmap-helm
    helm:
      valueFiles:
        - values.yaml
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: parksmap-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
