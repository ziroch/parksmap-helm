{{- if .Values.mongodb.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "parksmap.fullname" . }}-mongodb
  labels:
    {{- include "parksmap.labels" . | nindent 4 }}
    app.kubernetes.io/component: mongodb
    app.kubernetes.io/role: database
spec:
  type: {{ .Values.mongodb.service.type }}
  selector:
    {{- include "parksmap.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: mongodb
  ports:
  - port: {{ .Values.mongodb.service.port }}
    targetPort: {{ .Values.mongodb.service.targetPort }}
    protocol: TCP
    name: mongodb
{{- end }}
