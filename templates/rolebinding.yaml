{{- if .Values.rbac.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.rbac.roleBinding.name }}
  labels:
    {{- include "parksmap.labels" . | nindent 4 }}
    app.kubernetes.io/component: rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: {{ .Values.rbac.roleBinding.roleRef.kind }}
  name: {{ .Values.rbac.roleBinding.roleRef.name }}
subjects:
{{- range .Values.rbac.roleBinding.subjects }}
- kind: {{ .kind }}
  name: {{ .name }}
  {{- if .namespace }}
  namespace: {{ .namespace }}
  {{- else }}
  namespace: {{ $.Release.Namespace }}
  {{- end }}
{{- end }}
{{- end }}
