{{- if .Values.backend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "parksmap.fullname" . }}-backend
  labels:
    {{- include "parksmap.labels" . | nindent 4 }}
    app.kubernetes.io/component: nationalparks
    app.kubernetes.io/role: backend
    {{- with .Values.backend.service.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  type: {{ .Values.backend.service.type }}
  selector:
    {{- include "parksmap.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: nationalparks
  ports:
  - port: {{ .Values.backend.service.port }}
    targetPort: {{ .Values.backend.service.targetPort }}
    protocol: TCP
    name: http
{{- end }}
