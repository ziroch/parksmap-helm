apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: parksmap-helm-dev
  namespace: openshift-gitops
  labels:
    workshop: cap12
    lab: helm
    app: parksmap
    environment: dev
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://https://github.com/ziroch/parksmap-helm.git
    targetRevision: main
    path: parksmap-helm
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml
      parameters:
        - name: frontend.config.appName
          value: "Parksmap DEV - Workshop"
  destination:
    server: https://kubernetes.default.svc
    namespace: parksmap-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
